<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Warehouse System</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
</head>
<body class="container grid-lg">

    <h1>📦 Warehouse Dashboard</h1>

    <div class="columns">
        <div class="column col-6">
            <div class="card">
                <div class="card-header">
                    <div class="card-title h5">Stock Level</div>
                </div>
                <div class="card-body">
                    <p>Product A: 120 pcs</p>
                    <p>Product B: 75 pcs</p>
                </div>
            </div>
        </div>

        <div class="column col-6">
            <div class="card">
                <div class="card-header">
                    <div class="card-title h5">Account Balance</div>
                </div>
                <div class="card-body">
                    <h3>€10,000</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="columns">
        <div class="column col-3">
            <a href="purchase.html" class="btn btn-primary btn-block">Purchase</a>
        </div>
        <div class="column col-3">
            <a href="sale.html" class="btn btn-success btn-block">Sale</a>
        </div>
        <div class="column col-3">
            <a href="balance.html" class="btn btn-warning btn-block">Balance Change</a>
        </div>
        <div class="column col-3">
            <a href="history.html" class="btn btn-link btn-block">History</a>
        </div>
    </div>

</body>
</html>
