<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Warehouse System</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
</head>
<body class="container grid-lg">

<h1>📦 Warehouse Dashboard</h1>

<div class="columns">
    <!-- STOCK LEVEL -->
    <div class="column col-6">
        <div class="card">
            <div class="card-header">
                <div class="card-title h5">Stock Level</div>
            </div>
            <div class="card-body">
                {% if warehouse %}
                    {% for product, quantity in warehouse.items() %}
                        <p>{{ product }}: {{ quantity }} pcs</p>
                    {% endfor %}
                {% else %}
                    <p>No products in warehouse</p>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- ACCOUNT BALANCE -->
    <div class="column col-6">
        <div class="card">
            <div class="card-header">
                <div class="card-title h5">Account Balance</div>
            </div>
            <div class="card-body">
                <h3>€{{ balance }}</h3>
            </div>
        </div>
    </div>
</div>

<div class="divider"></div>

<!-- NAVIGATION BUTTONS -->
<div class="columns">
    <div class="column col-3">
        <a href="{{ url_for('purchase') }}" class="btn btn-primary btn-block">Purchase</a>
    </div>
    <div class="column col-3">
        <a href="{{ url_for('sale') }}" class="btn btn-success btn-block">Sale</a>
    </div>
    <div class="column col-3">
        <a href="{{ url_for('change_balance') }}" class="btn btn-warning btn-block">Balance Change</a>
    </div>
    <div class="column col-3">
        <a href="{{ url_for('show_history') }}" class="btn btn-link btn-block">History</a>
    </div>
</div>

</body>
</html>
