<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Purchase</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
</head>
<body class="container grid-lg">

<h2>Purchase Product</h2>

<form method="POST" action="{{ url_for('purchase') }}">
    <div class="form-group">
        <label>Product Name</label>
        <input class="form-input" type="text" name="name" required>
    </div>

    <div class="form-group">
        <label>Unit Price</label>
        <input class="form-input" type="number" name="price" step="0.01" min="0.01" required>
    </div>

    <div class="form-group">
        <label>Quantity</label>
        <input class="form-input" type="number" name="quantity" min="1" required>
    </div>

    <button type="submit" class="btn btn-primary">Submit</button>
    <a href="{{ url_for('index') }}" class="btn">Back</a>
</form>

</body>
</html>
