<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Balance Change</title>
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
</head>
<body class="container grid-lg">

<h2>Change Balance</h2>

<form method="POST" action="{{ url_for('change_balance') }}">
    <div class="form-group">
        <label>Operation</label>
        <select class="form-select" name="operation" required>
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
        </select>
    </div>

    <div class="form-group">
        <label>Amount</label>
        <input class="form-input" type="number" name="amount" step="0.01" min="0.01" required>
    </div>

    <button type="submit" class="btn btn-warning">Submit</button>
    <a href="{{ url_for('index') }}" class="btn">Back</a>
</form>

</body>
</html>
